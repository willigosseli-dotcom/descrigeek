<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DescriGeek — Générateur de descriptions VR</title>
  <link rel="stylesheet" href="/static/css/main.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="home-body">

  <!-- SCÈNE COUCHER DE SOLEIL -->
  <div class="sunset-scene">
    <div class="sky-gradient"></div>
    <svg class="mountains-svg" viewBox="0 0 1440 320" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,320 180,120 360,200 540,80 720,180 900,60 1080,160 1260,90 1440,150 1440,320" fill="rgba(90,60,130,0.45)"/>
      <polygon points="0,320 120,200 280,260 440,160 600,230 760,140 920,210 1100,170 1280,220 1440,180 1440,320" fill="rgba(40,30,80,0.65)"/>
      <rect x="0" y="290" width="1440" height="30" fill="rgba(20,15,50,0.7)"/>
    </svg>
    <div class="sun-glow"></div>
  </div>

  <!-- LOGO VR THETFORD en filigrane fond -->
  <div class="home-dealer-backdrop">
    <img src="/static/logos/vr-thetford.png" alt="" class="backdrop-logo">
  </div>

  <!-- CARTE CENTRALE -->
  <div class="home-center">
    <div class="home-card">

      <!-- Logo DescriGeek en haut -->
      <img src="/static/logos/descrigeek.png" alt="DescriGeek" class="home-descrigeek-logo">

      <p class="home-subtitle">Générateur intelligent de descriptions<br>de véhicules récréatifs</p>

      <!-- Séparateur avec logo VR Thetford -->
      <div class="home-dealer-strip">
        <img src="/static/logos/vr-thetford.png" alt="VR Thetford" class="home-vr-logo">
      </div>

      <a href="/login" class="btn-primary btn-lg home-login-btn">
        <i class="fa fa-right-to-bracket"></i>
        Se connecter
      </a>
    </div>
  </div>

  <!-- PIED DE PAGE PARTENAIRE -->
  <footer class="home-footer">
    <span class="home-footer-text">En collaboration avec</span>
    <img src="/static/logos/geeks-du-vr.png" alt="Les Geeks du VR" class="home-footer-logo">
  </footer>

</body>
</html>
