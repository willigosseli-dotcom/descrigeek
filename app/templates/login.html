<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — DescriGeek</title>
  <link rel="stylesheet" href="/static/css/main.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <img src="/assets/logos/descrigeek.png" alt="DescriGeek" style="max-height:100px;object-fit:contain;">
    </div>

    <p class="login-subtitle">Connectez-vous pour générer vos descriptions</p>

    {% if error %}
    <div class="alert alert-error">
      <i class="fa fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Nom d'utilisateur</label>
        <input class="form-control" type="text" id="username" name="username"
               placeholder="Entrez votre nom d'utilisateur" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary btn-lg w-full" style="justify-content:center; margin-top:8px;">
        <i class="fa fa-right-to-bracket"></i>
        Se connecter
      </button>
    </form>

    <div class="login-footer">
      <img src="/assets/logos/vr-thetford.png" alt="VR Thetford" style="max-height:22px;object-fit:contain;opacity:0.6;">
      <span style="color:#cbd5e1;">·</span>
      <span>En collaboration avec</span>
      <img src="/assets/logos/geeks-du-vr.png" alt="Les Geeks du VR" style="max-height:22px;object-fit:contain;">
    </div>
  </div>
</div>

</body>
</html>
